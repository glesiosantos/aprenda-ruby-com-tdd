<svg width="960" height="420" viewBox="0 0 960 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ciclo TDD</title>
  <desc id="desc">Diagrama circular com os passos Vermelho, Verde e Refatoracao.</desc>
  <defs>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#b42318"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#027a48"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#175cd3"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#101828" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="420" rx="24" fill="#f8fafc"/>
  <circle cx="480" cy="210" r="72" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
  <text x="480" y="200" text-anchor="middle" fill="#101828" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">TDD</text>
  <text x="480" y="232" text-anchor="middle" fill="#475467" font-family="Arial, Helvetica, sans-serif" font-size="18">passos pequenos</text>

  <g filter="url(#shadow)">
    <rect x="82" y="142" width="240" height="136" rx="18" fill="#ffffff" stroke="#fecdca" stroke-width="2"/>
    <circle cx="134" cy="194" r="28" fill="#fee4e2"/>
    <text x="134" y="204" text-anchor="middle" fill="#b42318" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">1</text>
    <text x="184" y="184" fill="#b42318" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Vermelho</text>
    <text x="184" y="218" fill="#475467" font-family="Arial, Helvetica, sans-serif" font-size="18">Escreva um teste</text>
    <text x="184" y="244" fill="#475467" font-family="Arial, Helvetica, sans-serif" font-size="18">que falha com clareza.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="638" y="58" width="240" height="136" rx="18" fill="#ffffff" stroke="#abefc6" stroke-width="2"/>
    <circle cx="690" cy="110" r="28" fill="#dcfae6"/>
    <text x="690" y="120" text-anchor="middle" fill="#027a48" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">2</text>
    <text x="740" y="100" fill="#027a48" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Verde</text>
    <text x="740" y="134" fill="#475467" font-family="Arial, Helvetica, sans-serif" font-size="18">Implemente o minimo</text>
    <text x="740" y="160" fill="#475467" font-family="Arial, Helvetica, sans-serif" font-size="18">para o teste passar.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="638" y="266" width="240" height="136" rx="18" fill="#ffffff" stroke="#b2ccff" stroke-width="2"/>
    <circle cx="690" cy="318" r="28" fill="#d1e9ff"/>
    <text x="690" y="328" text-anchor="middle" fill="#175cd3" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">3</text>
    <text x="740" y="308" fill="#175cd3" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Refatoracao</text>
    <text x="740" y="342" fill="#475467" font-family="Arial, Helvetica, sans-serif" font-size="18">Melhore o desenho</text>
    <text x="740" y="368" fill="#475467" font-family="Arial, Helvetica, sans-serif" font-size="18">sem mudar comportamento.</text>
  </g>

  <path d="M323 178 C428 84 514 70 637 93" stroke="#b42318" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-red)"/>
  <path d="M758 196 C788 226 789 244 758 264" stroke="#027a48" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-green)"/>
  <path d="M637 336 C489 382 377 340 300 278" stroke="#175cd3" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
</svg>
